<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Haven | Professional Exchange</title>
    
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/en/b/b9/Solana_logo.png">
    
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://crypto-js.stripe.com/crypto-onramp-outer.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-sol: #9945FF; --neon-cyan: #14F195; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255,255,255,0.1); }
        body { margin: 0; background: #050505; color: white; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--neon-cyan); letter-spacing: 2px; cursor: pointer; }

        .wallet-btn { background: var(--glass); border: 1px solid var(--neon-sol); color: white; padding: 10px 18px; border-radius: 50px; cursor: pointer; font-family: 'Orbitron', sans-serif; transition: 0.3s; }
        .wallet-btn:hover { box-shadow: 0 0 15px var(--neon-sol); background: var(--neon-sol); color: black; }

        /* Pages */
        .page { display: none; padding: 60px 20px; flex-direction: column; align-items: center; text-align: center; }
        .active { display: flex; }

        /* Main Card */
        .card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 24px; padding: 35px; width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); padding: 15px; color: white; border-radius: 12px; margin: 10px 0; box-sizing: border-box; font-size: 1.2rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(20, 241, 149, 0.2); }
        
        .action-btn { width: 100%; background: linear-gradient(45deg, var(--neon-sol), var(--neon-cyan)); color: black; border: none; padding: 18px; border-radius: 12px; font-family: 'Orbitron', sans-serif; font-weight: 900; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(153, 69, 255, 0.4); }

        /* Stripe Onramp Container */
        #onramp-element { width: 100%; margin-top: 20px; min-height: 400px; display: none; }

        /* Stats */
        .stat-item { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--neon-sol); margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        .stat-label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.8rem; font-family: 'Orbitron', sans-serif; margin-top: 5px; color: white; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showExchange()">SOLANA HAVEN</div>
        <button class="wallet-btn" id="nav-wallet">Connect Wallet</button>
    </nav>

    <div id="exchange-page" class="page active">
        <h1 style="font-family: 'Orbitron'; font-size: 3rem; margin: 0;">Buy Solana</h1>
        <p style="color: #888; margin-bottom: 40px;">Direct-to-Wallet via Stripe Crypto</p>

        <div class="card" id="main-buy-card">
            <div style="text-align: left;">
                <label style="font-size: 0.8rem; color: var(--neon-cyan); font-weight: bold;">AMOUNT (USD)</label>
                <input type="number" id="usd-input" placeholder="0.00" value="100">
                
                <label style="font-size: 0.8rem; color: var(--neon-sol); font-weight: bold;">DESTINATION WALLET</label>
                <input type="text" id="wallet-input" placeholder="Connect wallet or paste address">
            </div>
            
            <button class="action-btn" id="initiate-buy">Initialize Purchase</button>
            <p style="font-size: 0.7rem; color: #555; margin-top: 15px;">Powered by Stripe • No KYC Required for small amounts</p>
        </div>

        <div id="onramp-element"></div>
    </div>

    <div id="dashboard-page" class="page">
        <h1 style="font-family: 'Orbitron';">Asset Vault</h1>
        <div class="card">
            <div class="stat-item">
                <div class="stat-label">Available Balance</div>
                <div id="dash-sol" class="stat-value">0.000 SOL</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Market Value</div>
                <div id="dash-usd" class="stat-value" style="color: var(--neon-cyan);">$0.00</div>
            </div>
            <button class="action-btn" style="background: white; color: black;" onclick="showExchange()">Back to Exchange</button>
        </div>
    </div>

    <script>
        let userWallet = null;
        const solanaConn = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");

        // UI Toggle Functions
        function showDashboard() {
            document.getElementById('exchange-page').classList.remove('active');
            document.getElementById('dashboard-page').classList.add('active');
            updateBalances();
        }

        function showExchange() {
            document.getElementById('dashboard-page').classList.remove('active');
            document.getElementById('exchange-page').classList.add('active');
            document.getElementById('onramp-element').style.display = 'none';
            document.getElementById('main-buy-card').style.display = 'block';
        }

        // Wallet Connection
        async function connectWallet() {
            if (window.solana) {
                try {
                    const resp = await window.solana.connect();
                    userWallet = resp.publicKey.toString();
                    document.getElementById('nav-wallet').innerText = userWallet.slice(0, 5) + "...";
                    document.getElementById('wallet-input').value = userWallet;
                    updateBalances();
                } catch (err) { console.error("Connection failed"); }
            } else {
                alert("Please install Phantom Wallet!");
            }
        }

        // Fetch Real Balance
        async function updateBalances() {
            if (!userWallet) return;
            const pubKey = new solanaWeb3.PublicKey(userWallet);
            const balance = await solanaConn.getBalance(pubKey);
            const sol = balance / 1000000000;
            document.getElementById('dash-sol').innerText = sol.toFixed(4) + " SOL";
            document.getElementById('dash-usd').innerText = "$" + (sol * 145.50).toLocaleString(); // Manual price for now
        }

        // Stripe Onramp Logic
        document.getElementById('initiate-buy').addEventListener('click', () => {
            const walletAddr = document.getElementById('wallet-input').value;
            if (!walletAddr) return alert("Please connect or enter a wallet address");

            // UI Feedback
            document.getElementById('main-buy-card').style.display = 'none';
            document.getElementById('onramp-element').style.display = 'block';
            document.getElementById('onramp-element').innerHTML = "<p>Loading Secure Stripe Onramp...</p>";

            /* IMPORTANT: In a production environment, you would call your backend 
               to generate a 'client_secret' from Stripe. 
               Since we are on a static site, this is the UI placeholder:
            */
            setTimeout(() => {
                document.getElementById('onramp-element').innerHTML = `
                    <div style="background: white; color: black; padding: 20px; border-radius: 15px; text-align: left;">
                        <h3>Stripe Checkout</h3>
                        <p>Purchase: <b>${document.getElementById('usd-input').value} USD</b></p>
                        <p>Deliver to: <b>${walletAddr.slice(0,10)}...</b></p>
                        <hr>
                        <p style="font-size: 0.8rem;">[This is where the real Stripe Credit Card form appears once you connect your Stripe API Key]</p>
                        <button class="action-btn" onclick="showExchange()">Cancel</button>
                    </div>
                `;
            }, 1500);
        });

        document.getElementById('nav-wallet').addEventListener('click', () => {
            if (userWallet) showDashboard(); else connectWallet();
        });
    </script>
</body>
</html>
