<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptBet | Original Crypto Casino</title>
    <link rel="icon" type="image/png" href="https://cryptologos.cc/logos/solana-sol-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #0f212e; --card-bg: #1a2c38; --accent: #00ff88; --primary: #557086; }
        body { margin: 0; background: var(--main-bg); color: white; font-family: 'Inter', sans-serif; }
        
        /* Sidebar/Nav */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #1a2c38; border-bottom: 2px solid #2f4553; }
        .logo { font-family: 'Orbitron'; color: var(--accent); font-size: 1.5rem; letter-spacing: 2px; }
        
        .balance-pill { background: #071620; padding: 10px 20px; border-radius: 50px; font-weight: bold; border: 1px solid #2f4553; display: flex; gap: 10px; }

        .container { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

        /* Game Area */
        .game-card { background: var(--card-bg); border-radius: 15px; padding: 30px; width: 100%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .bet-input { background: #071620; border: 2px solid #2f4553; padding: 15px; border-radius: 8px; color: white; width: 200px; font-size: 1.2rem; }
        
        .btn-play { background: var(--accent); color: #000; border: none; padding: 15px 40px; border-radius: 8px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn-play:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* Withdraw Modal */
        .withdraw-section { margin-top: 40px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px dashed var(--primary); }
        .limit-text { color: #ff4444; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">CRYPTBET</div>
    <div class="balance-pill">
        <span style="color: var(--accent)">$</span>
        <span id="user-balance">0.00</span>
    </div>
</nav>

<div class="container">
    <div class="game-card">
        <h2 style="font-family: 'Orbitron'">MULTIPLIER</h2>
        <div style="font-size: 4rem; margin: 30px 0; color: var(--accent)" id="display">1.00x</div>
        
        <input type="number" class="bet-input" id="bet-amount" value="1.00">
        <br>
        <button class="btn-play" onclick="playGame()">BET</button>

        <div class="withdraw-section">
            <h3>Withdrawal</h3>
            <input type="text" id="wallet-addr" placeholder="Solana Wallet Address" style="width: 80%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none;">
            <br>
            <button onclick="requestWithdraw()" style="background: white; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Withdraw Funds</button>
            <p class="limit-text">Minimum Withdrawal: $20.00 USD equivalent</p>
        </div>
    </div>
</div>

<script>
    let balance = 10.00; // Starting with "Demo" balance
    document.getElementById('user-balance').innerText = balance.toFixed(2);

    function playGame() {
        const bet = parseFloat(document.getElementById('bet-amount').value);
        if (bet > balance) return alert("Insufficient funds!");

        balance -= bet;
        document.getElementById('user-balance').innerText = balance.toFixed(2);

        // Simulation of a win/loss
        const result = Math.random();
        if (result > 0.5) {
            const win = bet * 2;
            balance += win;
            document.getElementById('display').innerText = "2.00x";
            document.getElementById('display').style.color = "#00ff88";
            alert("Winner! +$" + win);
        } else {
            document.getElementById('display').innerText = "0.00x";
            document.getElementById('display').style.color = "#ff4444";
        }
        document.getElementById('user-balance').innerText = balance.toFixed(2);
    }

    function requestWithdraw() {
        if (balance < 20.00) {
            alert("Error: You must have at least $20.00 to withdraw.");
        } else {
            alert("Withdrawal of $" + balance.toFixed(2) + " initiated to the provided address.");
            // Here is where you would call your backend API to trigger a real transaction
        }
    }
</script>

</body>
</html>
