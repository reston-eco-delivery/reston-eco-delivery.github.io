<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reston Eco-Delivery | Dispatch</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0f1a;
            --card-bg: #161b2c;
            --primary: #10b981;
            --accent: #38bdf8;
            --warning: #fbbf24;
            --danger: #f43f5e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            margin: 0; padding: 20px; 
            color: var(--text-main);
            background-image: radial-gradient(circle at top right, #1e293b, #0b0f1a);
            min-height: 100vh;
        }

        .container { max-width: 550px; margin: auto; }

        .hero { 
            padding: 30px 20px; text-align: center; margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 28px; border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        .hero h1 { margin: 0; font-size: 2em; font-weight: 800; letter-spacing: -1px; }
        .hero p { color: var(--primary); font-weight: 800; font-size: 0.75em; letter-spacing: 2px; margin-top: 5px; }

        .mission {
            font-size: 0.8em; color: var(--text-dim); line-height: 1.5;
            padding: 18px; margin-bottom: 25px; border-radius: 20px;
            background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.1);
        }

        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 30px; 
            margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .status-pill {
            position: absolute; top: 20px; right: 20px;
            padding: 5px 14px; border-radius: 99px; font-size: 0.65em; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .status-open { background: rgba(16, 185, 129, 0.2); color: var(--primary); }
        .status-ontheway { background: rgba(56, 189, 248, 0.2); color: var(--accent); animation: pulse 2s infinite; }
        .status-delivered { background: rgba(248, 250, 252, 0.1); color: #fff; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .btn { 
            padding: 16px; border: none; border-radius: 18px; 
            cursor: pointer; font-weight: 800; width: 100%; 
            font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.2s;
        }
        .btn-post { background: var(--primary); color: white; margin-top: 15px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); }
        .btn-accept { background: var(--accent); color: #0b0f1a; }
        .btn-complete { background: var(--warning); color: #0b0f1a; }
        
        .btn-admin-delete { 
            background: rgba(244, 63, 94, 0.1); color: var(--danger); 
            border: 1px solid rgba(244, 63, 94, 0.3); font-size: 10px; 
            padding: 8px; width: 100%; margin-top: 15px; cursor: pointer; 
            border-radius: 12px; display: none; font-weight: 800;
        }

        .admin-panel { 
            background: #161b2c; padding: 30px; border-radius: 30px; 
            margin-bottom: 35px; display: none; border: 2px solid var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        input { 
            width: 100%; padding: 15px; margin: 8px 0; 
            background: #0b0f1a; border: 1px solid #2d3748; 
            border-radius: 15px; color: white; font-family: inherit;
        }
        input:focus { outline: none; border-color: var(--primary); }

        .addr-chip {
            background: rgba(11, 15, 26, 0.5); padding: 15px; 
            border-radius: 18px; margin: 12px 0; border: 1px solid #2d3748;
        }
        .label { font-size: 9px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .val { font-size: 14px; font-weight: 600; }

        .data-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .total-badge { font-size: 0.7em; color: var(--text-dim); font-weight: 700; }
        .pay-amount { font-size: 1.4em; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <button onclick="checkAdmin()" id="lock" style="float:right; background:none; border:none; color:var(--text-dim); cursor:pointer; font-size: 1.2em;">⚙️</button>
        <p>RESTON ECOSYSTEM // 20194</p>
        <h1>Eco-Delivery</h1>
    </div>

    <div class="mission">
        <strong>Mission:</strong> Riley (14) built this to save Reston restaurants from corporate fees. E-bike powered, zero emissions, and local-first.
    </div>

    <div id="admin-panel" class="admin-panel">
        <h2 style="margin:0 0 20px 0; font-size: 1.4em;">Dispatch Center</h2>
        <input type="text" id="r-name" placeholder="Restaurant Name (e.g. Glory Days)">
        <input type="text" id="r-addr" placeholder="Pickup Address">
        <input type="text" id="items" placeholder="Order Details (Items)">
        <input type="text" id="d-addr" placeholder="Delivery Address">
        <div style="display: flex; gap: 10px;">
            <input type="number" id="total" placeholder="Customer Total $">
            <input type="number" id="pay" placeholder="Biker Pay $">
        </div>
        <button onclick="postOrder()" class="btn btn-post">Release to Network</button>
    </div>

    <div id="order-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAPdW-0WhvsGk4Lbgjrp08QBnR0QBOJ44k",
        authDomain: "reston-delivery.firebaseapp.com",
        databaseURL: "https://reston-delivery-default-rtdb.firebaseio.com", 
        projectId: "reston-delivery",
        storageBucket: "reston-delivery.firebasestorage.app",
        messagingSenderId: "274165504629",
        appId: "1:274165504629:web:c46fec849aade16874f63c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const ordersRef = ref(db, 'orders');

    let isAdmin = false;

    window.checkAdmin = () => {
        if (prompt("Access Key:") === "reston_go") {
            isAdmin = true;
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('lock').innerHTML = "⚡ ADMIN ACTIVE";
            document.getElementById('lock').style.color = "var(--primary)";
            refreshBoard();
        }
    };

    window.postOrder = () => {
        push(ordersRef, {
            res: document.getElementById('r-name').value,
            res_a: document.getElementById('r-addr').value,
            it: document.getElementById('items').value,
            del_a: document.getElementById('d-addr').value,
            total: document.getElementById('total').value,
            pay: document.getElementById('pay').value,
            status: "open",
            created: serverTimestamp()
        });
        document.querySelectorAll('input').forEach(i => i.value = '');
    };

    function refreshBoard() {
        onValue(ordersRef, (snap) => {
            const list = document.getElementById('order-list');
            list.innerHTML = '';
            const data = snap.val();
            if(!data) {
                list.innerHTML = '<p style="text-align:center; color:var(--text-dim); margin-top:40px;">Network Quiet. No Active Dispatches.</p>';
                return;
            }

            const now = Date.now();

            Object.entries(data).reverse().forEach(([id, o]) => {
                // Hide delivered orders after 5 minutes
                if (o.status === "delivered" && o.deliveredAt && (now - o.deliveredAt > 300000)) {
                    remove(ref(db, `orders/${id}`));
                    return;
                }

                const card = document.createElement('div');
                card.className = `card`;
                
                let statusMarkup = `<span class="status-pill status-open">Available</span>`;
                let buttonMarkup = `<button onclick="updateStatus('${id}', 'ontheway')" class="btn btn-accept">Accept Job</button>`;

                if (o.status === "ontheway") {
                    statusMarkup = `<span class="status-pill status-ontheway">In Progress</span>`;
                    buttonMarkup = `<button onclick="completeOrder('${id}')" class="btn btn-complete">Mark Delivered</button>`;
                } else if (o.status === "delivered") {
                    statusMarkup = `<span class="status-pill status-delivered">✅ Completed</span>`;
                    buttonMarkup = `<p style="text-align:center; color:var(--primary); font-size:0.8em; font-weight:800; margin:10px 0;">DELIVERY FINALIZED</p>`;
                    card.style.opacity = "0.6";
                }

                card.innerHTML = `
                    ${statusMarkup}
                    <h2 style="margin:0; font-size:1.6em;">${o.res}</h2>
                    <p style="color:var(--text-dim); margin:6px 0 18px 0; font-weight:600;">${o.it}</p>
                    
                    <div class="addr-chip"><div class="label">Pickup</div><div class="val">📍 ${o.res_a}</div></div>
                    <div class="addr-chip"><div class="label">Destination</div><div class="val">🏠 ${o.del_a}</div></div>

                    <div class="data-row">
                        <div>
                            <div class="total-badge">CUSTOMER TOTAL: $${o.total}</div>
                            <div class="pay-amount">$${o.pay}</div>
                        </div>
                        <div style="width:170px;">${buttonMarkup}</div>
                    </div>

                    <button class="btn-admin-delete" style="display: ${isAdmin ? 'block' : 'none'}" onclick="forceDelete('${id}')">FORCE TERMINATE DISPATCH</button>
                `;
                list.appendChild(card);
            });
        });
    }

    window.updateStatus = (id, newStatus) => update(ref(db, `orders/${id}`), { status: newStatus });
    window.completeOrder = (id) => update(ref(db, `orders/${id}`), { status: "delivered", deliveredAt: Date.now() });
    window.forceDelete = (id) => { if(confirm("Admin: Delete this order?")) remove(ref(db, `orders/${id}`)); };

    refreshBoard();
</script>
</body>
</html>
