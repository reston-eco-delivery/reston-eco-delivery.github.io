<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reston Eco-Delivery | Biker Board</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --accent: #3b82f6;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            margin: 0; padding: 20px; 
            color: var(--text-main);
        }

        .container { max-width: 500px; margin: auto; }

        /* Header */
        .hero { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; padding: 25px; border-radius: 20px; 
            text-align: center; margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
        }

        /* Founder Story Section */
        .founder-box {
            background: #ecfdf5; border: 1px solid #d1fae5;
            padding: 15px; border-radius: 15px; margin-bottom: 20px;
            font-size: 0.9em; color: #065f46; line-height: 1.4;
        }

        /* Order Cards */
        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 18px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; 
            border: 1px solid #e5e7eb; position: relative;
        }
        
        .card.taken { opacity: 0.5; filter: grayscale(1); }

        .btn { 
            padding: 14px; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: 700; width: 100%; 
            transition: 0.2s; margin-top: 10px; font-size: 1em;
        }
        .btn-post { background: var(--primary); color: white; }
        .btn-accept { background: var(--accent); color: white; }
        .btn-complete { background: #ef4444; color: white; }

        .admin-panel { 
            background: white; padding: 20px; border-radius: 18px; 
            margin-bottom: 20px; display: none; border: 2px solid var(--primary);
        }

        input { 
            width: 100%; padding: 12px; margin: 6px 0; 
            border: 1px solid #d1d5db; border-radius: 10px; 
            box-sizing: border-box; font-size: 16px;
        }

        .address-group {
            background: #f8fafc; padding: 10px; border-radius: 10px;
            margin: 10px 0; border: 1px solid #e2e8f0;
        }
        .address-label { font-size: 0.7em; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        .address-text { font-size: 0.95em; font-weight: 600; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span style="font-size: 0.75em; font-weight: 800; letter-spacing: 1px;">RESTON 20194</span>
            <button onclick="checkAdmin()" id="admin-lock" style="background:none; border:1px solid white; color:white; border-radius:6px; padding:4px 8px; cursor:pointer; font-size: 0.7em;">ADMIN</button>
        </div>
        <h1 style="margin:0; font-size: 1.8em;">Eco-Delivery</h1>
        <p style="margin:5px 0 0; opacity: 0.9; font-size: 0.9em;">Fast. Green. Local.</p>
    </div>

    <div class="founder-box">
        <strong style="display:block; margin-bottom: 5px;">Riley's Mission:</strong>
        I'm 14 and I built this to stop DoorDash's crazy fees from hurting Reston restaurants. We deliver on e-bikes to keep our air clean and prices fair.
    </div>

    <div id="admin-panel" class="admin-panel">
        <h3 style="margin-top:0;">New Dispatch</h3>
        <input type="text" id="rest-name" placeholder="Restaurant Name">
        <input type="text" id="rest-addr" placeholder="Pickup Address">
        <input type="text" id="items" placeholder="What's in the order?">
        <input type="text" id="deliv-addr" placeholder="Delivery Address">
        <div style="display:flex; gap:10px;">
            <input type="number" id="total" placeholder="Total $">
            <input type="number" id="pay" placeholder="Biker Pay $">
        </div>
        <button onclick="postOrder()" class="btn btn-post">Send to Board</button>
    </div>

    <div id="order-list">
        <p style="text-align:center; color:#94a3b8;">Connecting to Reston network...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Your confirmed Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAPdW-0WhvsGk4Lbgjrp08QBnR0QBOJ44k",
        authDomain: "reston-delivery.firebaseapp.com",
        databaseURL: "https://reston-delivery-default-rtdb.firebaseio.com", 
        projectId: "reston-delivery",
        storageBucket: "reston-delivery.firebasestorage.app",
        messagingSenderId: "274165504629",
        appId: "1:274165504629:web:c46fec849aade16874f63c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const ordersRef = ref(db, 'orders');

    window.checkAdmin = () => {
        if (prompt("Enter Password:") === "reston_go") {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('admin-lock').style.display = 'none';
        }
    };

    window.postOrder = () => {
        const payload = {
            restaurant: document.getElementById('rest-name').value,
            pickup: document.getElementById('rest-addr').value,
            orderItems: document.getElementById('items').value,
            delivery: document.getElementById('deliv-addr').value,
            total: document.getElementById('total').value,
            pay: document.getElementById('pay').value,
            status: "available",
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };
        push(ordersRef, payload);
        document.querySelectorAll('input').forEach(i => i.value = '');
    };

    onValue(ordersRef, (snapshot) => {
        const list = document.getElementById('order-list');
        list.innerHTML = '';
        const data = snapshot.val();
        
        if (!data) {
            list.innerHTML = '<p style="text-align:center; color:#9ca3af; margin-top:30px;">Reston is quiet. No active orders.</p>';
            return;
        }

        Object.entries(data).reverse().forEach(([id, order]) => {
            const isTaken = order.status === "taken";
            const card = document.createElement('div');
            card.className = `card ${isTaken ? 'taken' : ''}`;
            
            card.innerHTML = `
                <h2 style="margin:0 0 5px 0; font-size:1.4em;">${order.restaurant}</h2>
                <p style="color:#6b7280; margin:0 0 15px 0; font-weight:500;">${order.orderItems}</p>
                
                <div class="address-group">
                    <div class="address-label">Pickup From:</div>
                    <div class="address-text">📍 ${order.pickup}</div>
                </div>

                <div class="address-group">
                    <div class="address-label">Deliver To:</div>
                    <div class="address-text">🏠 ${order.delivery}</div>
                </div>

                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                    <div style="background:#dcfce7; color:#166534; padding:6px 12px; border-radius:8px; font-weight:800;">
                        PAY: $${order.pay}
                    </div>
                    <span style="font-size:0.7em; color:#9ca3af; font-weight:600;">${order.time}</span>
                </div>

                ${isTaken ? 
                    `<button onclick="finish('${id}')" class="btn btn-complete">Complete Order</button>` : 
                    `<button onclick="accept('${id}')" class="btn btn-accept">Accept Order</button>`
                }
            `;
            list.appendChild(card);
        });
    });

    window.accept = (id) => update(ref(db, `orders/${id}`), { status: "taken" });
    window.finish = (id) => remove(ref(db, `orders/${id}`));
</script>
</body>
</html>
